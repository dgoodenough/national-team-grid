name: Refresh data

# Keeps the live site current: re-pulls the latest martj42 matches + FotMob ranking daily,
# rebuilds the JSON, and commits it if anything changed (which redeploys GitHub Pages).
on:
  schedule:
    - cron: "0 7 * * *"   # daily ~07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild data from source
        run: python build.py --refresh

      - name: Commit if data changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "No data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Auto-refresh match data ($(date -u +%F))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages build
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X POST "repos/${{ github.repository }}/pages/builds"
